<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공공데이터 API 순수 테스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8fafc; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; color: white; background-color: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background-color: #1d4ed8; }
        #status { margin-top: 15px; font-weight: bold; font-size: 1.1rem; color: #d97706; }
        #result-box { margin-top: 20px; border: 1px solid #cbd5e1; background: #f1f5f9; padding: 15px; border-radius: 6px; height: 400px; overflow-y: auto; }
        .data-item { background: white; border: 1px solid #e2e8f0; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .data-item strong { color: #0f172a; font-size: 1.1rem; }
        .data-item span { color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 공공데이터 API 연동 테스트</h2>
        <p>지도와 기타 기능을 모두 빼고 순수하게 데이터가 들어오는지 확인합니다.</p>
        
        <button onclick="testApiConnection()">데이터 불러오기 테스트</button>
        <div id="status">대기 중... 버튼을 눌러주세요.</div>
        
        <div id="result-box">
            결과가 이곳에 출력됩니다.<br>
            (키보드 F12를 눌러 Console 창을 열어두시면 더 자세한 에러 원인을 볼 수 있습니다)
        </div>
    </div>

    <script>
        function testApiConnection() {
            const statusDiv = document.getElementById('status');
            const resultBox = document.getElementById('result-box');
            
            statusDiv.innerText = "⏳ 데이터를 요청하는 중입니다... (잠시만 기다려주세요)";
            statusDiv.style.color = "#d97706";
            resultBox.innerHTML = "";

            const apiKey = '8badc9836e19e169b28ce280ac25e8c4c0fba9aed68e7f39ee470c5968805a21';
            // 💡 테스트용이므로 10개만 빠르게 불러옵니다.
            const targetUrl = `https://apis.data.go.kr/B550928/longTermCareInstInfoService01/getLongTermCareInstInfo?serviceKey=${apiKey}&pageNo=1&numOfRows=10`;
            const proxyUrl = "https://api.allorigins.win/raw?url=";
            const finalUrl = proxyUrl + encodeURIComponent(targetUrl);

            console.log("👉 [1단계] 요청 URL을 생성했습니다:", finalUrl);

            fetch(finalUrl)
                .then(res => {
                    console.log(`👉 [2단계] 서버 응답 코드: ${res.status} (200이면 통신 정상)`);
                    if(!res.ok) throw new Error(`HTTP 통신 에러: ${res.status}`);
                    return res.text();
                })
                .then(str => {
                    console.log("👉 [3단계] 서버에서 받은 원본 데이터 (아래 화살표를 눌러 확인해보세요) 👇");
                    console.log(str); // F12 콘솔창에서 원본 XML 확인 가능
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(str, "text/xml");
                    
                    // 에러 메시지 태그 확인
                    const errMsg = xmlDoc.getElementsByTagName("errMsg")[0]?.textContent;
                    const returnAuthMsg = xmlDoc.getElementsByTagName("returnAuthMsg")[0]?.textContent;
                    
                    if(errMsg && !errMsg.includes("NORMAL_SERVICE")) throw new Error("API 에러: " + errMsg);
                    if(returnAuthMsg && !returnAuthMsg.includes("NORMAL_SERVICE")) throw new Error("인증 에러: " + returnAuthMsg);

                    // 실제 데이터 파싱
                    const items = xmlDoc.getElementsByTagName("item");
                    
                    if(items.length === 0) {
                        statusDiv.innerText = `⚠️ 통신은 성공했지만 데이터가 0개입니다. (F12 콘솔창의 원본 데이터를 확인하세요)`;
                        statusDiv.style.color = "#dc2626"; // 빨간색
                        return;
                    }

                    statusDiv.innerText = `✅ 성공! 총 ${items.length}개의 데이터를 불러왔습니다.`;
                    statusDiv.style.color = "#16a34a"; // 초록색

                    let html = "";
                    for(let i = 0; i < items.length; i++) {
                        const name = items[i].getElementsByTagName("instNm")[0]?.textContent || items[i].getElementsByTagName("adminNm")[0]?.textContent || "이름없음";
                        const addr = items[i].getElementsByTagName("addr")[0]?.textContent || "주소없음";
                        const code = items[i].getElementsByTagName("longTermAdminSym")[0]?.textContent || "코드없음";

                        html += `<div class="data-item">
                            <strong>[${i+1}] ${name}</strong><br>
                            <span>기관코드: ${code} | 주소: ${addr}</span>
                        </div>`;
                    }
                    resultBox.innerHTML = html;
                })
                .catch(err => {
                    console.error("❌ 에러 발생:", err);
                    statusDiv.innerText = "❌ 에러가 발생했습니다: " + err.message;
                    statusDiv.style.color = "#dc2626";
                    resultBox.innerHTML = "키보드 <strong>F12</strong> 키를 눌러 <strong>Console(콘솔)</strong> 창의 빨간색 에러 메시지를 캡처해서 보여주세요.";
                });
        }
    </script>
</body>
</html>
